<!DOCTYPE html>
<html>
<head>
<title>Password Strength Checker</title>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.card {
    background: white;
    padding: 25px;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}
input {
    width: 90%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}
.progress {
    width: 100%;
    height: 10px;
    background: #eee;
    border-radius: 10px;
    margin: 10px 0;
}
.bar {
    height: 10px;
    width: 0%;
    border-radius: 10px;
    transition: 0.3s;
}
ul {
    text-align: left;
    font-size: 14px;
    padding-left: 20px;
}
li {
    margin: 5px 0;
}
</style>
</head>

<body>

<div class="card">
    <h4>Password Strength Checker</h4>

    <input type="password" id="pass" placeholder="Enter Password" oninput="check()">

    <!-- Progress bar -->
    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <p id="result"></p>

    <!-- Checklist -->
    <ul>
        <li id="l1">✖ At least 8 characters</li>
        <li id="l2">✖ Lowercase letter</li>
        <li id="l3">✖ Uppercase letter</li>
        <li id="l4">✖ Number</li>
        <li id="l5">✖ Special character</li>
    </ul>
</div>

<script>
function check() {
    let p = document.getElementById("pass").value;
    let score = 0;

    let c1 = p.length >= 8;
    let c2 = /[a-z]/.test(p);
    let c3 = /[A-Z]/.test(p);
    let c4 = /[0-9]/.test(p);
    let c5 = /[^A-Za-z0-9]/.test(p);

    if(c1) score++;
    if(c2) score++;
    if(c3) score++;
    if(c4) score++;
    if(c5) score++;

    // Update checklist
    set("l1", c1);
    set("l2", c2);
    set("l3", c3);
    set("l4", c4);
    set("l5", c5);

    // Progress bar
    let bar = document.getElementById("bar");
    bar.style.width = (score * 20) + "%";

    // Colors
    if(score <= 2){
        bar.style.background = "red";
        result = "Weak Password";
    }
    else if(score == 3){
        bar.style.background = "orange";
        result = "Medium Password";
    }
    else if(score == 4){
        bar.style.background = "yellowgreen";
        result = "Strong Password";
    }
    else{
        bar.style.background = "green";
        result = "Very Strong Password";
    }

    document.getElementById("result").innerText = result;
}

// Checklist helper
function set(id, condition){
    let el = document.getElementById(id);
    if(condition){
        el.innerHTML = "✔ " + el.innerText.slice(2);
        el.style.color = "green";
    } else {
        el.innerHTML = "✖ " + el.innerText.slice(2);
        el.style.color = "red";
    }
}
</script>

</body>
</html>
